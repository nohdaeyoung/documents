<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Archives</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #f8f6f1;
      --fg: #1a1a18;
      --muted: #8a8780;
      --accent: #c4450a;
      --card-bg: #ffffff;
      --border: #e5e2db;
      --tag-html: #c4450a;
      --tag-md: #2a6b4f;
      --tag-other: #5c5a55;
    }

    body {
      font-family: 'Instrument Sans', sans-serif;
      background: var(--bg);
      color: var(--fg);
      min-height: 100vh;
      line-height: 1.6;
    }

    .noise {
      position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 200px;
    }

    .container {
      position: relative; z-index: 1;
      max-width: 720px;
      margin: 0 auto;
      padding: 80px 24px 120px;
    }

    header {
      margin-bottom: 64px;
      border-bottom: 2px solid var(--fg);
      padding-bottom: 24px;
    }

    header h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(2.4rem, 6vw, 3.6rem);
      font-weight: 400;
      letter-spacing: -0.02em;
      line-height: 1.1;
    }

    header p {
      margin-top: 12px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .stats {
      display: flex;
      gap: 32px;
      margin-top: 16px;
      font-size: 0.85rem;
      color: var(--muted);
    }

    .stats span strong {
      color: var(--fg);
      font-weight: 600;
    }

    /* Search */
    .search-bar {
      position: relative;
      margin-bottom: 40px;
    }

    .search-bar input {
      width: 100%;
      padding: 14px 20px 14px 48px;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      background: var(--card-bg);
      font-family: inherit;
      font-size: 0.95rem;
      color: var(--fg);
      outline: none;
      transition: border-color 0.2s;
    }

    .search-bar input:focus {
      border-color: var(--fg);
    }

    .search-bar svg {
      position: absolute;
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
    }

    /* Archive List */
    .archive-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 1px;
      background: var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    .archive-item {
      background: var(--card-bg);
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 20px 24px;
      text-decoration: none;
      color: inherit;
      transition: background 0.15s, padding-left 0.2s;
    }

    .archive-item:hover {
      background: #faf9f6;
      padding-left: 32px;
    }

    .archive-item .tag {
      flex-shrink: 0;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 4px 10px;
      border-radius: 6px;
      background: #f0ece4;
      color: var(--tag-other);
    }

    .archive-item .tag.html { background: #fef0ea; color: var(--tag-html); }
    .archive-item .tag.md   { background: #e8f5ef; color: var(--tag-md); }

    .archive-item .info {
      flex: 1;
      min-width: 0;
    }

    .archive-item .title {
      font-weight: 500;
      font-size: 1rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .archive-item .meta {
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 2px;
    }

    .archive-item .arrow {
      flex-shrink: 0;
      color: var(--muted);
      opacity: 0;
      transform: translateX(-4px);
      transition: opacity 0.2s, transform 0.2s;
    }

    .archive-item:hover .arrow {
      opacity: 1;
      transform: translateX(0);
    }

    /* Empty State */
    .empty {
      text-align: center;
      padding: 80px 24px;
      color: var(--muted);
    }

    .empty .icon {
      font-size: 2.4rem;
      margin-bottom: 16px;
      opacity: 0.4;
    }

    .empty p {
      font-size: 0.95rem;
    }

    .empty code {
      background: #e5e2db;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 0.85rem;
    }

    /* Loading */
    .loading {
      text-align: center;
      padding: 60px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .loading .dot {
      display: inline-block;
      animation: pulse 1.2s ease-in-out infinite;
    }
    .loading .dot:nth-child(2) { animation-delay: 0.15s; }
    .loading .dot:nth-child(3) { animation-delay: 0.3s; }

    @keyframes pulse {
      0%, 80%, 100% { opacity: 0.3; }
      40% { opacity: 1; }
    }

    /* Fade in */
    .archive-item {
      animation: fadeUp 0.35s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    footer {
      margin-top: 80px;
      text-align: center;
      font-size: 0.8rem;
      color: var(--muted);
    }

    @media (max-width: 480px) {
      .container { padding: 48px 16px 80px; }
      header { margin-bottom: 40px; }
      .archive-item { padding: 16px; }
      .stats { gap: 20px; flex-wrap: wrap; }
    }
  </style>
</head>
<body>
  <div class="noise"></div>
  <div class="container">
    <header>
      <h1>Archives</h1>
      <p>정적 웹페이지 아카이브 — 파일을 추가하면 자동으로 목록이 업데이트됩니다.</p>
      <div class="stats" id="stats"></div>
    </header>

    <div class="search-bar">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" id="search" placeholder="파일 이름으로 검색…" autocomplete="off">
    </div>

    <div id="content">
      <div class="loading">
        <span class="dot">●</span> <span class="dot">●</span> <span class="dot">●</span>
      </div>
    </div>

    <footer>
      자동 생성된 아카이브 목록 · GitHub Pages
    </footer>
  </div>

  <script>
    const contentEl = document.getElementById('content');
    const searchEl = document.getElementById('search');
    const statsEl = document.getElementById('stats');
    let allFiles = [];

    async function loadArchives() {
      try {
        const res = await fetch('archives.json?' + Date.now());
        if (!res.ok) throw new Error('not found');
        allFiles = await res.json();
        renderStats(allFiles);
        renderList(allFiles);
      } catch {
        allFiles = [];
        renderStats([]);
        renderEmpty();
      }
    }

    function renderStats(files) {
      if (files.length === 0) {
        statsEl.innerHTML = '';
        return;
      }
      const htmlCount = files.filter(f => f.ext === 'html').length;
      const mdCount = files.filter(f => f.ext === 'md').length;
      const otherCount = files.length - htmlCount - mdCount;

      let parts = [`<span>전체 <strong>${files.length}</strong>개</span>`];
      if (htmlCount) parts.push(`<span>HTML <strong>${htmlCount}</strong></span>`);
      if (mdCount) parts.push(`<span>Markdown <strong>${mdCount}</strong></span>`);
      if (otherCount) parts.push(`<span>기타 <strong>${otherCount}</strong></span>`);
      statsEl.innerHTML = parts.join('');
    }

    function renderList(files) {
      if (files.length === 0) {
        renderEmpty();
        return;
      }

      const ul = document.createElement('ul');
      ul.className = 'archive-list';

      files.forEach((file, i) => {
        const a = document.createElement('a');
        a.className = 'archive-item';
        a.href = `archives/${file.name}`;
        a.style.animationDelay = `${i * 0.04}s`;

        const ext = file.ext || 'file';
        const tagClass = ['html', 'md'].includes(ext) ? ext : '';

        a.innerHTML = `
          <span class="tag ${tagClass}">${ext}</span>
          <div class="info">
            <div class="title">${file.title || file.name}</div>
            <div class="meta">${file.name}${file.size ? ' · ' + formatSize(file.size) : ''}${file.date ? ' · ' + file.date : ''}</div>
          </div>
          <svg class="arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="9 18 15 12 9 6"/>
          </svg>
        `;
        ul.appendChild(a);
      });

      contentEl.innerHTML = '';
      contentEl.appendChild(ul);
    }

    function renderEmpty() {
      contentEl.innerHTML = `
        <div class="empty">
          <div class="icon">📂</div>
          <p><code>archives/</code> 폴더에 파일을 추가하면<br>이곳에 자동으로 목록이 표시됩니다.</p>
        </div>
      `;
    }

    function formatSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / 1048576).toFixed(1) + ' MB';
    }

    // Search
    searchEl.addEventListener('input', () => {
      const q = searchEl.value.toLowerCase().trim();
      if (!q) {
        renderList(allFiles);
        return;
      }
      const filtered = allFiles.filter(f =>
        f.name.toLowerCase().includes(q) ||
        (f.title && f.title.toLowerCase().includes(q))
      );
      renderList(filtered);
    });

    loadArchives();
  </script>
</body>
</html>
