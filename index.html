<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DaeYoung Archives — 대영 아카이브</title>
  <meta name="description" content="다양한 주제의 웹 문서를 아카이브합니다. 블로그, 리포트, 노트 등 정적 웹페이지 모음.">
  <meta name="keywords" content="아카이브, 블로그, 웹문서, 정적페이지">
  <meta name="author" content="nohdaeyoung">
  <link rel="canonical" href="https://nohdaeyoung.github.io/documents/">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Archives — 정적 웹페이지 아카이브">
  <meta property="og:description" content="다양한 주제의 웹 문서를 아카이브합니다.">
  <meta property="og:url" content="https://nohdaeyoung.github.io/documents/">
  <meta property="og:image" content="https://nohdaeyoung.github.io/documents/og-image.png">
  <meta property="og:locale" content="ko_KR">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Archives — 정적 웹페이지 아카이브">
  <meta name="twitter:description" content="다양한 주제의 웹 문서를 아카이브합니다.">
  <meta name="twitter:image" content="https://nohdaeyoung.github.io/documents/og-image.png">

  <!-- Favicon -->
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">

  <!-- JSON-LD -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "CollectionPage",
    "name": "Archives",
    "description": "다양한 주제의 웹 문서를 아카이브합니다.",
    "url": "https://nohdaeyoung.github.io/documents/"
  }
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #f8f6f1;
      --fg: #1a1a18;
      --muted: #8a8780;
      --accent: #c4450a;
      --card-bg: #ffffff;
      --border: #e5e2db;
    }

    body {
      font-family: 'Instrument Sans', sans-serif;
      background: var(--bg);
      color: var(--fg);
      min-height: 100vh;
      line-height: 1.6;
    }

    .noise {
      position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 200px;
    }

    .container {
      position: relative; z-index: 1;
      max-width: 720px;
      margin: 0 auto;
      padding: 80px 24px 120px;
    }

    header {
      margin-bottom: 64px;
      border-bottom: 2px solid var(--fg);
      padding-bottom: 24px;
    }

    header h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(2.4rem, 6vw, 3.6rem);
      font-weight: 400;
      letter-spacing: -0.02em;
      line-height: 1.1;
    }

    header p {
      margin-top: 12px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    /* Filter Tabs */
    .filters {
      display: flex;
      gap: 8px;
      margin-top: 20px;
      flex-wrap: wrap;
    }

    .filter-tab {
      padding: 6px 16px;
      border: 1.5px solid var(--border);
      border-radius: 100px;
      background: transparent;
      font-family: inherit;
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.02em;
    }

    .filter-tab:hover {
      border-color: var(--fg);
      color: var(--fg);
    }

    .filter-tab.active {
      background: var(--fg);
      border-color: var(--fg);
      color: var(--bg);
    }

    .filter-tab .count {
      display: inline-block;
      margin-left: 6px;
      font-size: 0.72rem;
      opacity: 0.6;
    }

    /* Search */
    .search-bar {
      position: relative;
      margin-bottom: 40px;
    }

    .search-bar input {
      width: 100%;
      padding: 14px 20px 14px 48px;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      background: var(--card-bg);
      font-family: inherit;
      font-size: 0.95rem;
      color: var(--fg);
      outline: none;
      transition: border-color 0.2s;
    }

    .search-bar input:focus {
      border-color: var(--fg);
    }

    .search-bar svg {
      position: absolute;
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
    }

    /* Archive List */
    .archive-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 1px;
      background: var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    .archive-item {
      background: var(--card-bg);
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 20px 24px;
      text-decoration: none;
      color: inherit;
      transition: background 0.15s, padding-left 0.2s;
      cursor: pointer;
    }

    .archive-item:hover {
      background: #faf9f6;
      padding-left: 32px;
    }

    .archive-item .tag {
      flex-shrink: 0;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      padding: 4px 10px;
      border-radius: 6px;
    }

    .archive-item .info {
      flex: 1;
      min-width: 0;
    }

    .archive-item .title-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .archive-item .title {
      font-weight: 500;
      font-size: 1rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
      min-width: 0;
    }

    .new-tab-btn {
      flex-shrink: 0;
      display: inline-flex; align-items: center; justify-content: center;
      width: 22px; height: 22px;
      color: var(--muted);
      opacity: 0;
      transition: all 0.15s;
      text-decoration: none;
    }

    .archive-item:hover .new-tab-btn {
      opacity: 1;
    }

    .new-tab-btn:hover {
      color: var(--fg);
    }

    .archive-item .meta {
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 2px;
    }

    /* Empty State */
    .empty {
      text-align: center;
      padding: 80px 24px;
      color: var(--muted);
    }

    .empty .icon {
      font-size: 2.4rem;
      margin-bottom: 16px;
      opacity: 0.4;
    }

    .empty p { font-size: 0.95rem; }

    .empty code {
      background: #e5e2db;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 0.85rem;
    }

    /* Loading */
    .loading {
      text-align: center;
      padding: 60px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .loading .dot {
      display: inline-block;
      animation: pulse 1.2s ease-in-out infinite;
    }
    .loading .dot:nth-child(2) { animation-delay: 0.15s; }
    .loading .dot:nth-child(3) { animation-delay: 0.3s; }

    @keyframes pulse {
      0%, 80%, 100% { opacity: 0.3; }
      40% { opacity: 1; }
    }

    .archive-item {
      animation: fadeUp 0.35s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    footer {
      margin-top: 80px;
      text-align: center;
      font-size: 0.8rem;
      color: var(--muted);
    }

    @media (max-width: 480px) {
      .container { padding: 48px 16px 80px; }
      header { margin-bottom: 40px; }
      .archive-item { padding: 16px; gap: 12px; }
      .filters { gap: 6px; }
      .filter-tab { padding: 5px 12px; font-size: 0.78rem; }
    }
  </style>
</head>
<body>
  <div class="noise"></div>
  <div class="container">
    <header>
      <h1>Archives</h1>
      <p>다양한 주제의 웹 문서를 아카이브합니다.</p>
      <div class="filters" id="filters"></div>
    </header>

    <div class="search-bar">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" id="search" placeholder="파일 이름으로 검색…" autocomplete="off">
    </div>

    <div id="content">
      <div class="loading">
        <span class="dot">●</span> <span class="dot">●</span> <span class="dot">●</span>
      </div>
    </div>

    <footer>
      자동 생성된 아카이브 목록 · GitHub Pages
    </footer>
  </div>

  <script>
    const contentEl = document.getElementById('content');
    const searchEl = document.getElementById('search');
    const filtersEl = document.getElementById('filters');
    let allFiles = [];
    let categories = [];
    let activeFilter = 'all';

    async function loadData() {
      try {
        const [archivesRes, catsRes] = await Promise.all([
          fetch('archives.json?' + Date.now()),
          fetch('categories.json?' + Date.now()).catch(() => null)
        ]);

        if (!archivesRes.ok) throw new Error('archives not found');
        allFiles = await archivesRes.json();

        if (catsRes && catsRes.ok) {
          categories = await catsRes.json();
        }

        // Sort by order field if present, then by date
        allFiles.sort((a, b) => {
          if (a.order !== undefined && b.order !== undefined) return a.order - b.order;
          return (b.date || '').localeCompare(a.date || '');
        });

        renderFilters();
        applyFilters();
      } catch {
        allFiles = [];
        renderFilters();
        renderEmpty();
      }
    }

    function renderFilters() {
      if (allFiles.length === 0) {
        filtersEl.innerHTML = '';
        return;
      }

      // Count by category
      const catCounts = {};
      allFiles.forEach(f => {
        const cat = f.category || f.ext || 'other';
        catCounts[cat] = (catCounts[cat] || 0) + 1;
      });

      let html = `<button class="filter-tab active" data-filter="all">전체<span class="count">${allFiles.length}</span></button>`;

      // Category-based filters
      categories.forEach(cat => {
        if (catCounts[cat.id]) {
          html += `<button class="filter-tab" data-filter="${cat.id}">${cat.label}<span class="count">${catCounts[cat.id]}</span></button>`;
        }
      });

      // Ext-based for uncategorized
      const categorizedIds = new Set(categories.map(c => c.id));
      Object.keys(catCounts).sort().forEach(key => {
        if (!categorizedIds.has(key)) {
          html += `<button class="filter-tab" data-filter="${key}">${key}<span class="count">${catCounts[key]}</span></button>`;
        }
      });

      filtersEl.innerHTML = html;

      filtersEl.querySelectorAll('.filter-tab').forEach(btn => {
        btn.addEventListener('click', () => {
          filtersEl.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          activeFilter = btn.dataset.filter;
          applyFilters();
        });
      });
    }

    function applyFilters() {
      const q = searchEl.value.toLowerCase().trim();
      let filtered = allFiles;

      if (activeFilter !== 'all') {
        filtered = filtered.filter(f => {
          return (f.category || f.ext || 'other') === activeFilter;
        });
      }

      if (q) {
        filtered = filtered.filter(f =>
          f.name.toLowerCase().includes(q) ||
          (f.title && f.title.toLowerCase().includes(q))
        );
      }

      renderList(filtered);
    }

    function renderList(files) {
      if (files.length === 0) {
        renderEmpty();
        return;
      }

      const ul = document.createElement('ul');
      ul.className = 'archive-list';

      files.forEach((file, i) => {
        const li = document.createElement('li');

        // Find category info
        const cat = categories.find(c => c.id === file.category);
        const tagBg = cat ? cat.color + '18' : '#f0ece4';
        const tagColor = cat ? cat.color : '#5c5a55';
        const tagLabel = cat ? cat.label : (file.ext || 'file');

        li.innerHTML = `
          <a class="archive-item" href="archives/${file.name}" style="animation-delay:${i * 0.04}s">
            <span class="tag" style="background:${tagBg};color:${tagColor}">${tagLabel}</span>
            <div class="info">
              <div class="title-row">
                <div class="title">${file.title || file.name}</div>
                <a href="archives/${file.name}" target="_blank" rel="noopener" class="new-tab-btn" title="새 탭에서 열기" onclick="event.stopPropagation();event.preventDefault();window.open(this.href)">
                  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
                    <polyline points="15 3 21 3 21 9"/>
                    <line x1="10" y1="14" x2="21" y2="3"/>
                  </svg>
                </a>
              </div>
              <div class="meta">${file.size ? formatSize(file.size) : ''}${file.size && file.date ? ' · ' : ''}${file.date || ''}</div>
            </div>
          </a>
        `;
        ul.appendChild(li);
      });

      contentEl.innerHTML = '';
      contentEl.appendChild(ul);
    }

    function renderEmpty() {
      contentEl.innerHTML = `
        <div class="empty">
          <div class="icon">📂</div>
          <p><code>archives/</code> 폴더에 파일을 추가하면<br>이곳에 자동으로 목록이 표시됩니다.</p>
        </div>
      `;
    }

    function formatSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / 1048576).toFixed(1) + ' MB';
    }

    searchEl.addEventListener('input', () => applyFilters());

    loadData();
  </script>
</body>
</html>
