<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>324 Lecture & Study Archives</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&family=Noto+Sans+KR:wght@300;400;500;600&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f0e8;
  --bg-card: #fffdf9;
  --text: #2c1810;
  --text-sub: #6b5b4e;
  --text-dim: #a0927f;
  --accent: #8b4513;
  --border: rgba(44,24,16,0.08);
  --border-hover: rgba(139,69,19,0.25);
  --tag-bg: rgba(139,69,19,0.08);
  --font-serif: 'Noto Serif KR', serif;
  --font-sans: 'Noto Sans KR', sans-serif;
  --font-mono: 'DM Mono', monospace;
  --transition: 0.25s ease;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body { background: var(--bg); color: var(--text); font-family: var(--font-sans); line-height: 1.7; min-height: 100vh; }

.site-header { max-width: 860px; margin: 0 auto; padding: 3.5rem 2rem 0; }
.site-id { font-family: var(--font-mono); font-size: 0.72rem; letter-spacing: 0.1em; color: var(--accent); margin-bottom: 1rem; }
.site-title { font-family: var(--font-serif); font-size: clamp(1.6rem, 4vw, 2.2rem); font-weight: 700; line-height: 1.35; margin-bottom: 0.5rem; }
.site-desc { font-size: 0.94rem; color: var(--text-sub); margin-bottom: 2rem; }

.toolbar { max-width: 860px; margin: 0 auto; padding: 1rem 2rem; position: sticky; top: 0; z-index: 50; background: var(--bg); border-bottom: 1px solid var(--border); transition: box-shadow 0.3s; }
.toolbar.scrolled { box-shadow: 0 4px 20px rgba(44,24,16,0.06); }
.search-wrap { position: relative; margin-bottom: 0.8rem; }
.search-input { width: 100%; padding: 0.65rem 1rem 0.65rem 2.4rem; border: 1px solid var(--border); border-radius: 6px; background: var(--bg-card); font-family: var(--font-sans); font-size: 0.88rem; color: var(--text); outline: none; transition: border-color var(--transition); }
.search-input::placeholder { color: var(--text-dim); }
.search-input:focus { border-color: var(--accent); }
.search-icon { position: absolute; left: 0.8rem; top: 50%; transform: translateY(-50%); color: var(--text-dim); pointer-events: none; }
.search-clear { position: absolute; right: 0.6rem; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 1.1rem; display: none; padding: 0.2rem; }
.search-clear.show { display: block; }
.search-clear:hover { color: var(--accent); }
.filter-row { display: flex; gap: 0.4rem; flex-wrap: wrap; align-items: center; }
.filter-btn { padding: 0.3rem 0.75rem; border: 1px solid var(--border); border-radius: 100px; background: transparent; font-family: var(--font-sans); font-size: 0.76rem; font-weight: 400; color: var(--text-sub); cursor: pointer; transition: all var(--transition); white-space: nowrap; }
.filter-btn:hover { border-color: var(--border-hover); color: var(--accent); }
.filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 500; }
.filter-count { font-family: var(--font-mono); font-size: 0.68rem; color: var(--text-dim); margin-left: auto; flex-shrink: 0; }

.archive-list { max-width: 860px; margin: 0 auto; padding: 1rem 2rem 4rem; }
.year-group { margin-bottom: 0.5rem; }
.year-header { display: flex; align-items: center; gap: 0.8rem; padding: 0.8rem 0; cursor: pointer; user-select: none; border-bottom: 1px solid var(--border); transition: border-color var(--transition); }
.year-header:hover { border-color: var(--border-hover); }
.year-label { font-family: var(--font-mono); font-size: 0.88rem; font-weight: 500; color: var(--accent); letter-spacing: 0.02em; }
.year-count { font-family: var(--font-mono); font-size: 0.68rem; color: var(--text-dim); }
.year-chevron { margin-left: auto; color: var(--text-dim); transition: transform 0.3s ease; flex-shrink: 0; }
.year-group.open .year-chevron { transform: rotate(180deg); }
.year-items { overflow: hidden; max-height: 0; transition: max-height 0.4s ease; }
.year-group.open .year-items { max-height: 5000px; }

.article-card { display: flex; align-items: flex-start; gap: 1rem; text-decoration: none; color: inherit; padding: 1.2rem 0; border-bottom: 1px solid var(--border); transition: all var(--transition); }
.article-card:last-child { border-bottom: none; }
.article-card:hover { padding-left: 0.6rem; }
.article-card:hover .card-title { color: var(--accent); }
.card-thumb { width: 80px; height: 56px; border-radius: 4px; background: var(--border); flex-shrink: 0; object-fit: cover; display: none; }
.card-thumb.has-img { display: block; }
.card-body { flex: 1; min-width: 0; }
.card-top { display: flex; align-items: center; gap: 0.6rem; margin-bottom: 0.3rem; flex-wrap: wrap; }
.card-date { font-family: var(--font-mono); font-size: 0.7rem; color: var(--text-dim); letter-spacing: 0.02em; flex-shrink: 0; }
.card-tag { font-family: var(--font-sans); font-size: 0.64rem; font-weight: 500; color: var(--accent); background: var(--tag-bg); padding: 0.12rem 0.45rem; border-radius: 3px; }
.card-title { font-family: var(--font-serif); font-size: 1.06rem; font-weight: 700; line-height: 1.5; transition: color var(--transition); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

.no-results { display: none; text-align: center; padding: 4rem 1rem; color: var(--text-dim); font-size: 0.92rem; }
.no-results.show { display: block; }
.no-results .nr-icon { font-size: 2rem; margin-bottom: 0.8rem; opacity: 0.4; }
.loading { text-align: center; padding: 4rem 1rem; color: var(--text-dim); font-size: 0.88rem; }
.loading .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 0.5rem; vertical-align: middle; }
@keyframes spin { to { transform: rotate(360deg); } }

.site-footer { max-width: 860px; margin: 0 auto; padding: 0 2rem 3rem; text-align: center; font-family: var(--font-mono); font-size: 0.68rem; color: var(--text-dim); letter-spacing: 0.04em; }

@media (max-width: 640px) {
  .site-header { padding: 2.5rem 1.25rem 0; }
  .toolbar { padding-left: 1.25rem; padding-right: 1.25rem; }
  .archive-list { padding: 1rem 1.25rem 3rem; }
  .card-title { font-size: 0.96rem; }
  .site-footer { padding: 0 1.25rem 2rem; }
}
</style>
</head>
<body>

<header class="site-header">
  <div class="site-id">324.ing</div>
  <h1 class="site-title">Lecture & Study Archives</h1>
  <p class="site-desc">324가 경험한 강연과 연구 아카이브</p>
</header>

<div class="toolbar" id="toolbar">
  <div class="search-wrap">
    <svg class="search-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
    <input class="search-input" id="searchInput" type="text" placeholder="제목으로 검색...">
    <button class="search-clear" id="searchClear">×</button>
  </div>
  <div class="filter-row" id="filterRow">
    <button class="filter-btn active" data-cat="all">전체</button>
    <span class="filter-count" id="filterCount"></span>
  </div>
</div>

<main class="archive-list" id="archiveList">
  <div class="loading" id="loadingState"><span class="spinner"></span>아카이브를 불러오는 중...</div>
</main>

<div class="no-results" id="noResults">
  <div class="nr-icon">∅</div>
  검색 결과가 없습니다.<br>다른 키워드로 시도해보세요.
</div>

<footer class="site-footer">© 324.ing — Noh Daeyoung</footer>

<script>
/**
 * ════════════════════════════════════════════
 *  archives.json 스키마
 * ════════════════════════════════════════════
 *  {
 *    "name":      "파일명.html",
 *    "title":     "표시 제목",
 *    "ext":       "html",
 *    "category":  "blog" | "md" | "note",
 *    "size":      12345,
 *    "date":      "2023-04-24",
 *    "order":     0,
 *    "thumbnail": "" | "thumb.jpg"
 *  }
 *
 *  category 매핑:
 *    blog → 강연 아티클 (완성된 글)
 *    md   → 연구 노트 (마크다운 기반 정리)
 *    note → 세미나 노트 (요약/메모)
 * ════════════════════════════════════════════
 */

const ARCHIVES_JSON = './archives.json';

const CAT_LABELS = {
  blog: '강연 아티클',
  md:   '연구 노트',
  note: '세미나 노트'
};

// 필터 순서 고정
const CAT_ORDER = ['blog', 'md', 'note'];

const archiveList = document.getElementById('archiveList');
const loadingState = document.getElementById('loadingState');
const noResults    = document.getElementById('noResults');
const filterRow    = document.getElementById('filterRow');
const filterCount  = document.getElementById('filterCount');
const searchInput  = document.getElementById('searchInput');
const searchClear  = document.getElementById('searchClear');
const toolbar      = document.getElementById('toolbar');

let items = [];
let activeFilter = 'all';

// ── Init ──
async function init() {
  try {
    const res = await fetch(ARCHIVES_JSON);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const raw = await res.json();
    const arr = Array.isArray(raw) ? raw : [];

    items = arr.map(normalize).sort((a, b) => {
      // 1차: 날짜 내림차순, 2차: order 오름차순
      if (b.sortDate !== a.sortDate) return b.sortDate.localeCompare(a.sortDate);
      return a.order - b.order;
    });

    buildFilters();
    render();
    loadingState.remove();
  } catch (err) {
    loadingState.innerHTML =
      '<div style="text-align:center;padding:4rem 1rem;color:var(--accent);font-size:0.88rem;">' +
      '아카이브를 불러올 수 없습니다.<br><small>' + err.message + '</small></div>';
  }
}

// ── Normalize ──
function normalize(raw) {
  const date = raw.date || '';
  const sortDate = date; // 이미 YYYY-MM-DD 형식
  const displayDate = date.replace(/-/g, '.');
  const year = date.substring(0, 4) || 'Unknown';

  return {
    title:     raw.title || raw.name || '',
    fileName:  raw.name || '',
    date:      displayDate,
    sortDate,
    year,
    category:  raw.category || 'note',
    catLabel:  CAT_LABELS[raw.category] || raw.category,
    order:     raw.order ?? 999,
    thumbnail: raw.thumbnail || '',
    size:      raw.size || 0
  };
}

// ── Build Filters ──
function buildFilters() {
  const existing = new Set(items.map(i => i.category));
  const countEl = filterRow.querySelector('.filter-count');

  CAT_ORDER.forEach(cat => {
    if (!existing.has(cat)) return;
    const btn = document.createElement('button');
    btn.className = 'filter-btn';
    btn.dataset.cat = cat;
    btn.textContent = CAT_LABELS[cat] || cat;
    filterRow.insertBefore(btn, countEl);
  });

  filterRow.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      filterRow.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeFilter = btn.dataset.cat;
      applyFilters();
    });
  });
}

// ── Render ──
function render() {
  archiveList.innerHTML = '';

  const grouped = {};
  items.forEach(item => {
    if (!grouped[item.year]) grouped[item.year] = [];
    grouped[item.year].push(item);
  });

  const years = Object.keys(grouped).sort((a, b) => b.localeCompare(a));
  const openYears = new Set(years.slice(0, 2));

  years.forEach(year => {
    const group = document.createElement('div');
    group.className = 'year-group' + (openYears.has(year) ? ' open' : '');
    group.dataset.year = year;

    group.innerHTML =
      '<div class="year-header">' +
        '<span class="year-label">' + year + '</span>' +
        '<span class="year-count">' + grouped[year].length + '건</span>' +
        '<svg class="year-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>' +
      '</div>' +
      '<div class="year-items">' +
        grouped[year].map(cardHTML).join('') +
      '</div>';

    group.querySelector('.year-header').addEventListener('click', function () {
      this.parentElement.classList.toggle('open');
    });

    archiveList.appendChild(group);
  });

  filterCount.textContent = items.length + '건';
}

function cardHTML(item) {
  const href = item.fileName || '#';
  const thumbHTML = item.thumbnail
    ? '<img class="card-thumb has-img" src="' + item.thumbnail + '" alt="">'
    : '';

  return (
    '<a class="article-card" href="' + href + '"' +
    ' data-cat="' + item.category + '"' +
    ' data-title="' + escAttr(item.title) + '">' +
      thumbHTML +
      '<div class="card-body">' +
        '<div class="card-top">' +
          '<span class="card-date">' + item.date + '</span>' +
          '<span class="card-tag">' + item.catLabel + '</span>' +
        '</div>' +
        '<div class="card-title">' + escHTML(item.title) + '</div>' +
      '</div>' +
    '</a>'
  );
}

function escHTML(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escAttr(s) { return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }

// ── Filter & Search ──
function applyFilters() {
  const query = searchInput.value.toLowerCase().trim();
  let visibleCount = 0;

  document.querySelectorAll('.year-group').forEach(group => {
    const cards = group.querySelectorAll('.article-card');
    let gv = 0;

    cards.forEach(card => {
      const cat   = card.dataset.cat;
      const title = (card.dataset.title || '').toLowerCase();

      const catOk    = activeFilter === 'all' || cat === activeFilter;
      const searchOk = !query || title.includes(query);

      card.style.display = (catOk && searchOk) ? '' : 'none';
      if (catOk && searchOk) { gv++; visibleCount++; }
    });

    group.style.display = gv > 0 ? '' : 'none';
    group.querySelector('.year-count').textContent = gv + '건';
    if (query && gv > 0) group.classList.add('open');
  });

  filterCount.textContent = visibleCount + '건';
  noResults.classList.toggle('show', visibleCount === 0);
  archiveList.style.display = visibleCount === 0 ? 'none' : '';
}

// ── Events ──
searchInput.addEventListener('input', () => {
  searchClear.classList.toggle('show', searchInput.value.length > 0);
  applyFilters();
});

searchClear.addEventListener('click', () => {
  searchInput.value = '';
  searchClear.classList.remove('show');
  applyFilters();
  searchInput.focus();
});

window.addEventListener('scroll', () => {
  toolbar.classList.toggle('scrolled', window.scrollY > 100);
});

// ── Go ──
init();
</script>
</body>
</html>
